<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VimFields Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <header class="header">
      <h1 class="title">VimFields</h1>
      <label class="toggle" aria-label="Enable VimFields">
        <input type="checkbox" id="enabled-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </header>

    <section class="section">
      <label class="field-label" for="escape-remap">
        Escape remap
        <span class="field-hint">Key sequence to exit insert mode</span>
      </label>
      <input type="text" id="escape-remap" class="input" placeholder="jk" maxlength="4">
    </section>

    <section class="section">
      <span class="field-label">
        Disabled sites
        <span class="field-hint">
          VimFields is off on these hosts and their subdomains.
          Use <code>*.example.com</code> to exclude only subdomains.
        </span>
      </span>

      <div class="current-site" id="current-site-row">
        <span class="current-site-host" id="current-site-host">—</span>
        <button type="button" id="current-site-btn" class="btn btn-small">
          Disable here
        </button>
      </div>

      <ul class="chip-list" id="disabled-sites-list" aria-label="Disabled sites"></ul>

      <form class="add-row" id="add-form">
        <input
          type="text"
          id="add-input"
          class="input"
          placeholder="example.com or *.example.com"
          autocomplete="off"
          spellcheck="false"
        >
        <button type="submit" class="btn">Add</button>
      </form>
    </section>

    <footer class="footer">
      <span id="status" class="status" role="status" aria-live="polite"></span>
    </footer>
  </div>

  <script src="../dist/popup/popup.js" type="module"></script>
</body>
</html>
